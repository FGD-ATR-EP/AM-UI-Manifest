<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aetherium Manifest | Cognitive Runtime</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Inter:wght@300;400;500&display=swap');

        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Inter', sans-serif;
            color: #e2e8f0;
            user-select: none;
        }

        .font-mono { font-family: 'JetBrains Mono', monospace; }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
        }

        .glass-panel {
            background: rgba(10, 10, 15, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 4px; }

        input:focus { outline: none; }
        .composer-active { box-shadow: 0 0 20px rgba(99, 102, 241, 0.4); border-color: rgba(99, 102, 241, 0.6); }
        .glow-text { text-shadow: 0 0 10px rgba(255, 255, 255, 0.5); }
    </style>
</head>
<body class="text-sm">

    <div id="canvas-container"></div>

    <div class="absolute inset-0 z-10 pointer-events-none flex flex-col justify-between p-4 sm:p-6">
        
        <div class="flex justify-between items-start pointer-events-auto w-full">
            <div class="glass-panel rounded-xl p-4 w-64 space-y-3">
                <div class="flex justify-between items-center border-b border-white/10 pb-2">
                    <div class="flex items-center space-x-2">
                        <div id="status-indicator" class="w-2 h-2 rounded-full bg-indigo-500 animate-pulse"></div>
                        <span class="font-bold tracking-wider text-xs text-indigo-200 uppercase">Aetherium OS</span>
                    </div>
                    <span class="text-[10px] font-mono text-gray-400">mf-3.29.5</span>
                </div>
                
                <div class="space-y-2 font-mono text-[10px]">
                    <div class="flex justify-between">
                        <span class="text-gray-400">STATE</span>
                        <span id="metric-state" class="text-cyan-400 glow-text">STANDBY</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-gray-400">ENERGY</span>
                        <div class="w-24 h-1 bg-gray-800 rounded-full overflow-hidden">
                            <div id="bar-energy" class="h-full bg-cyan-400 w-[20%] transition-all duration-300"></div>
                        </div>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-gray-400">ENTROPY</span>
                        <div class="w-24 h-1 bg-gray-800 rounded-full overflow-hidden">
                            <div id="bar-entropy" class="h-full bg-purple-400 w-[10%] transition-all duration-300"></div>
                        </div>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-gray-400">LOAD</span>
                        <span id="metric-load" class="text-emerald-400">12ms</span>
                    </div>
                </div>

                <div id="console-logs" class="h-20 overflow-y-auto pt-2 border-t border-white/10 font-mono text-[9px] text-gray-500 space-y-1 mt-2">
                    <div>[SYS] Cognitive Runtime Ready.</div>
                </div>
            </div>

            <div class="flex flex-col items-end">
                <button id="btn-settings" class="p-2 glass-panel rounded-full hover:bg-white/10 transition-colors text-gray-400 hover:text-white">
                    <i data-lucide="settings" class="w-4 h-4"></i>
                </button>
                
                <div id="panel-settings" class="glass-panel rounded-xl p-4 mt-2 w-72 hidden transition-all">
                    <h3 class="text-xs font-bold text-gray-300 mb-3 uppercase tracking-wider">Gateway Configuration</h3>
                    <div class="space-y-3 font-mono text-[10px]">
                        <div>
                            <label class="block text-gray-500 mb-1">API Base</label>
                            <input type="text" id="cfg-api" value="http://localhost:8080" class="w-full bg-black/50 border border-white/10 rounded px-2 py-1 text-gray-300 font-mono">
                        </div>
                        <div>
                            <label class="block text-gray-500 mb-1">WS Base</label>
                            <input type="text" id="cfg-ws" value="ws://localhost:8090" class="w-full bg-black/50 border border-white/10 rounded px-2 py-1 text-gray-300 font-mono">
                        </div>
                        <div class="pt-2">
                            <button id="btn-connect" class="w-full bg-indigo-600/30 hover:bg-indigo-600/50 text-indigo-200 border border-indigo-500/30 rounded py-1.5 transition-colors">Apply & Sync</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="w-full max-w-2xl mx-auto pointer-events-auto pb-4 sm:pb-8">
            <div id="visual-target" class="mb-4 glass-panel rounded-xl p-4 hidden">
                <div class="flex items-center justify-between border-b border-white/5 pb-2 mb-3">
                    <div class="flex items-center space-x-2">
                        <i data-lucide="brain-circuit" class="w-4 h-4 text-cyan-400"></i>
                        <span class="text-xs text-gray-400 font-mono">Cognitive Manifestation</span>
                    </div>
                    <button id="btn-close-target" class="text-gray-500 hover:text-white"><i data-lucide="x" class="w-4 h-4"></i></button>
                </div>
                <div id="target-content" class="text-sm text-gray-300"></div>
            </div>

            <div id="composer-container" class="glass-panel rounded-2xl p-2 flex items-center space-x-2 transition-all duration-300 border border-white/10">
                <button class="p-2 sm:p-3 text-gray-400 hover:text-white hover:bg-white/5 rounded-xl transition-colors shrink-0">
                    <i data-lucide="sparkle" class="w-5 h-5"></i>
                </button>
                
                <input type="text" id="composer-input" 
                       class="flex-1 bg-transparent text-white placeholder-gray-500 text-sm sm:text-base py-2 px-2"
                       placeholder="ป้อนเจตจำนงเชิงปัญญา (Cognitive Intent)...">
                
                <button id="btn-emit" class="px-4 py-2 sm:py-3 bg-indigo-500/20 hover:bg-indigo-500/40 border border-indigo-500/30 text-indigo-200 hover:text-white rounded-xl transition-all flex items-center justify-center shrink-0">
                    <span class="font-bold tracking-wider text-xs sm:text-sm">EMIT</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // --- Configuration & UI Elements ---
        const UI = {
            state: document.getElementById('metric-state'),
            energy: document.getElementById('bar-energy'),
            entropy: document.getElementById('bar-entropy'),
            load: document.getElementById('metric-load'),
            logs: document.getElementById('console-logs'),
            composer: document.getElementById('composer-input'),
            composerContainer: document.getElementById('composer-container'),
            emitBtn: document.getElementById('btn-emit'),
            settingsBtn: document.getElementById('btn-settings'),
            settingsPanel: document.getElementById('panel-settings'),
            visualTarget: document.getElementById('visual-target'),
            targetContent: document.getElementById('target-content'),
            closeTargetBtn: document.getElementById('btn-close-target')
        };

        const apiKey = ""; // เติมโดยอัตโนมัติโดยสภาพแวดล้อม
        let sysState = { mode: 'STANDBY', energyLevel: 0.2, entropyLevel: 0.1 };

        function log(msg, type = 'SYS') {
            const entry = document.createElement('div');
            entry.textContent = `[${type}] ${msg}`;
            if(type === 'ERR') entry.classList.add('text-red-400');
            if(type === 'API') entry.classList.add('text-purple-400');
            UI.logs.appendChild(entry);
            UI.logs.scrollTop = UI.logs.scrollHeight;
        }

        // --- WebGL Particle Engine ---
        let scene, camera, renderer, particles, particleMaterial;
        let clock = new THREE.Clock();

        function initWebGL() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
            camera.position.z = 400;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            const count = 30000;
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);
            const phases = new Float32Array(count);

            for (let i = 0; i < count; i++) {
                const r = 100 + Math.random() * 300;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos((Math.random() * 2) - 1);
                positions[i*3] = r * Math.sin(phi) * Math.cos(theta);
                positions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
                positions[i*3+2] = r * Math.cos(phi);
                
                colors[i*3] = 0.38; colors[i*3+1] = 0.4; colors[i*3+2] = 0.94; // Default Indigo
                phases[i] = Math.random() * Math.PI * 2;
            }

            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geo.setAttribute('phase', new THREE.BufferAttribute(phases, 1));

            particleMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    time: { value: 0 },
                    energy: { value: 0.2 },
                    entropy: { value: 0.1 }
                },
                vertexShader: `
                    uniform float time;
                    uniform float energy;
                    uniform float entropy;
                    attribute vec3 color;
                    attribute float phase;
                    varying vec3 vColor;
                    void main() {
                        vColor = color;
                        vec3 pos = position;
                        float movement = sin(time * 0.5 + phase) * (20.0 * entropy);
                        pos += normalize(pos) * movement * (1.0 + energy);
                        vec4 mvPos = modelViewMatrix * vec4(pos, 1.0);
                        gl_PointSize = (2.0 + energy * 3.0) * (300.0 / -mvPos.z);
                        gl_Position = projectionMatrix * mvPos;
                    }
                `,
                fragmentShader: `
                    varying vec3 vColor;
                    void main() {
                        if (length(gl_PointCoord - vec2(0.5)) > 0.5) discard;
                        gl_FragColor = vec4(vColor, 0.8);
                    }
                `,
                transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
            });

            particles = new THREE.Points(geo, particleMaterial);
            scene.add(particles);

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            const t = clock.getElapsedTime();
            particleMaterial.uniforms.time.value = t;
            particleMaterial.uniforms.energy.value = THREE.MathUtils.lerp(particleMaterial.uniforms.energy.value, sysState.energyLevel, 0.05);
            particleMaterial.uniforms.entropy.value = THREE.MathUtils.lerp(particleMaterial.uniforms.entropy.value, sysState.entropyLevel, 0.05);
            
            particles.rotation.y += 0.001 * (1.0 + sysState.energyLevel);
            renderer.render(scene, camera);
        }

        // --- Core Logic & API Integration ---
        function setSystemState(mode) {
            sysState.mode = mode;
            UI.state.textContent = mode;
            if(mode === 'THINKING') {
                sysState.energyLevel = 0.5; sysState.entropyLevel = 0.7;
                UI.composerContainer.classList.add('composer-active');
            } else if(mode === 'EMITTING') {
                sysState.energyLevel = 1.2; sysState.entropyLevel = 0.3;
            } else {
                UI.composerContainer.classList.remove('composer-active');
            }
            UI.energy.style.width = (Math.min(sysState.energyLevel, 1) * 100) + '%';
            UI.entropy.style.width = (Math.min(sysState.entropyLevel, 1) * 100) + '%';
        }

        async function triggerEmit(intent) {
            if(!intent.trim()) return;
            UI.composer.value = ''; UI.composer.disabled = true; UI.emitBtn.disabled = true;
            
            log(`Capturing Intent: "${intent}"`, 'SYS');
            setSystemState('THINKING');

            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-exp:generateContent?key=${apiKey}`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Analyze intent: "${intent}". Return JSON: {interpretation: string, energy: number (0-1.5), entropy: number (0-1.5), colors: [hex1, hex2, hex3]}` }] }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });
                
                const data = await response.json();
                const result = JSON.parse(data.candidates[0].content.parts[0].text);
                
                setSystemState('EMITTING');
                log(`Neural sync complete. Mutating Aether field.`, 'API');

                // Apply results
                sysState.energyLevel = result.energy;
                sysState.entropyLevel = result.entropy;
                
                // Update particle colors
                const cols = result.colors.map(c => new THREE.Color(c));
                const attrColors = particles.geometry.attributes.color.array;
                for(let i=0; i<attrColors.length/3; i++) {
                    const c = cols[Math.floor(Math.random()*3)];
                    attrColors[i*3] = c.r; attrColors[i*3+1] = c.g; attrColors[i*3+2] = c.b;
                }
                particles.geometry.attributes.color.needsUpdate = true;

                UI.targetContent.innerHTML = `
                    <div class="space-y-2">
                        <div class="p-3 bg-indigo-500/10 border border-indigo-500/20 rounded font-mono text-[11px] leading-relaxed">
                            > ${result.interpretation}
                        </div>
                        <div class="flex space-x-2">
                            ${result.colors.map(c => `<div class="w-4 h-4 rounded-sm border border-white/10" style="background:${c}"></div>`).join('')}
                        </div>
                    </div>
                `;
                UI.visualTarget.classList.remove('hidden');

            } catch (e) {
                log(`Link Error: ${e.message}`, 'ERR');
            }

            setTimeout(() => setSystemState('STANDBY'), 2000);
            UI.composer.disabled = false; UI.emitBtn.disabled = false;
        }

        // --- Event Listeners ---
        UI.emitBtn.onclick = () => triggerEmit(UI.composer.value);
        UI.composer.onkeypress = (e) => { if(e.key === 'Enter') triggerEmit(UI.composer.value); };
        UI.settingsBtn.onclick = () => UI.settingsPanel.classList.toggle('hidden');
        UI.closeTargetBtn.onclick = () => UI.visualTarget.classList.add('hidden');
        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };

        window.onload = initWebGL;
    </script>
</body>
</html>
